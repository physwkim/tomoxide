name: Deploy docs to GitHub Pages

# Build the mdBook documentation site (book.toml + docs/) and publish it to
# GitHub Pages on every push to main that touches the docs or this workflow.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "book.toml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Least-privilege token for Pages deployment via the GitHub Actions source.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deployment at a time; do not cancel a running deploy.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  MDBOOK_VERSION: "0.4.40"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: actions/configure-pages@v5
      - name: Build the book
        run: mdbook build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
